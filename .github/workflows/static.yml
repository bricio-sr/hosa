name: Deploy Documentation Site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'docs-site/**'           # Só roda quando o site muda — não rebuilda a cada commit de Go
  workflow_dispatch:          # Permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-site'       # ← Só a pasta do site, não o repo inteiro

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
