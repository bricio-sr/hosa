<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <title>Hosa Benchmarks</title>
    <style>
      :root {
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --border-color: #e2e8f0;
        --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-family);
        -webkit-font-smoothing: antialiased;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        line-height: 1.5;
      }

      /* Header Moderno */
      header {
        background-color: var(--card-bg);
        padding: 24px 40px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      }

      .header-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      h1.page-title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
      }

      .header-item {
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      a:hover {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      /* Botão de Download */
      button {
        color: #fff;
        background-color: var(--accent);
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }

      button:hover {
        background-color: var(--accent-hover);
      }
      
      button:active {
        transform: scale(0.98);
      }

      main {
        padding: 40px;
        max-width: 1600px;
        margin: 0 auto;
      }

      /* Seção de cada Tool/Pacote */
      .benchmark-set {
        margin-bottom: 48px;
      }

      .benchmark-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 24px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--border-color);
        color: var(--text-main);
      }

      /* O Pulo do Gato: CSS Grid para parar de ficar comprido */
      .benchmark-graphs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
        gap: 24px;
        width: 100%;
      }

      /* Cards dos Gráficos */
      .chart-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        display: flex;
        flex-direction: column;
        transition: box-shadow 0.2s;
      }

      .chart-card:hover {
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }

      .chart-title {
        margin: 0 0 16px 0;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-main);
        word-break: break-all;
      }

      .canvas-container {
        position: relative;
        height: 280px; /* Altura fixa impede que fiquem gigantes */
        width: 100%;
      }

      footer {
        text-align: center;
        padding: 24px 40px;
        border-top: 1px solid var(--border-color);
        color: var(--text-muted);
        font-size: 0.875rem;
        background-color: var(--card-bg);
      }

      @media (max-width: 768px) {
        .benchmark-graphs {
          grid-template-columns: 1fr;
        }
        main {
          padding: 20px;
        }
        header {
          padding: 16px 20px;
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <header id="header">
      <div class="header-info">
        <h1 class="page-title">Performance Dashboard</h1>
        <div class="header-item">
          <strong>Última Atualização:</strong> <span id="last-update"></span>
        </div>
        <div class="header-item">
          <strong>Repositório:</strong> <a id="repository-link" rel="noopener" target="_blank"></a>
        </div>
      </div>
      <div>
        <button id="dl-button">
          <svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Exportar JSON
        </button>
      </div>
    </header>

    <main id="main"></main>

    <footer>
      <div>Gerado automaticamente via <a rel="noopener" target="_blank" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        const toolColors = {
          cargo: '#dea584',
          go: '#00add8',
          benchmarkjs: '#f1e05a',
          benchmarkluau: '#000080',
          pytest: '#3572a5',
          googlecpp: '#f34b7d',
          catch2: '#f34b7d',
          julia: '#a270ba',
          jmh: '#b07219',
          benchmarkdotnet: '#178600',
          customBiggerIsBetter: '#38ff38',
          customSmallerIsBetter: '#ff3838',
          _: '#3b82f6' // Corrigido para combinar com o tema
        };

        function init() {
          function collectBenchesPerTestCase(entries) {
            const map = new Map();
            for (const entry of entries) {
              const {commit, date, tool, benches} = entry;
              for (const bench of benches) {
                const result = { commit, date, tool, bench };
                const arr = map.get(bench.name);
                if (arr === undefined) {
                  map.set(bench.name, [result]);
                } else {
                  arr.push(result);
                }
              }
            }
            return map;
          }

          const data = window.BENCHMARK_DATA;

          // Render header
          const dateObj = new Date(data.lastUpdate);
          document.getElementById('last-update').textContent = dateObj.toLocaleString('pt-BR');
          
          const repoLink = document.getElementById('repository-link');
          repoLink.href = data.repoUrl;
          // Limpa a URL para ficar mais amigável na tela
          repoLink.textContent = data.repoUrl.replace('https://github.com/', '');

          // Render footer/export
          document.getElementById('dl-button').onclick = () => {
            const dataUrl = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data, null, 2));
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'hosa_benchmark_data.json';
            a.click();
          };

          return Object.keys(data.entries).map(name => ({
            name,
            dataSet: collectBenchesPerTestCase(data.entries[name]),
          }));
        }

        function renderAllChars(dataSets) {
          function renderGraph(parent, name, dataset) {
            const canvas = document.createElement('canvas');
            parent.appendChild(canvas);

            const color = toolColors[dataset.length > 0 ? dataset[0].tool : '_'];
            const data = {
              labels: dataset.map(d => d.commit.id.slice(0, 7)),
              datasets: [
                {
                  label: 'Resultado',
                  data: dataset.map(d => d.bench.value),
                  borderColor: color,
                  backgroundColor: color + '20', // Opacidade reduzida pra ficar suave
                  borderWidth: 2,
                  pointBackgroundColor: color,
                  pointRadius: 3,
                  pointHoverRadius: 5,
                }
              ],
            };
            const options = {
              responsive: true,
              maintainAspectRatio: false, // Fundamental para o card controlar o tamanho
              legend: { display: false },
              scales: {
                xAxes: [{
                  gridLines: { display: false, drawBorder: false },
                  ticks: { fontColor: '#64748b' }
                }],
                yAxes: [{
                  gridLines: { color: '#e2e8f0', drawBorder: false, zeroLineColor: '#cbd5e1' },
                  scaleLabel: {
                    display: true,
                    labelString: dataset.length > 0 ? dataset[0].bench.unit : '',
                    fontColor: '#64748b'
                  },
                  ticks: { beginAtZero: true, fontColor: '#64748b' }
                }],
              },
              tooltips: {
                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                titleFontFamily: 'Inter',
                bodyFontFamily: 'Inter',
                cornerRadius: 8,
                callbacks: {
                  afterTitle: items => {
                    const {index} = items[0];
                    const data = dataset[index];
                    return '\n' + data.commit.message + '\n\n' + new Date(data.commit.timestamp).toLocaleString('pt-BR') + ' por @' + data.commit.committer.username + '\n';
                  },
                  label: item => {
                    let label = item.value;
                    const { range, unit } = dataset[item.index].bench;
                    label += ' ' + unit;
                    if (range) {
                      label += ' (' + range + ')';
                    }
                    return label;
                  }
                }
              },
              onClick: (_mouseEvent, activeElems) => {
                if (activeElems.length === 0) return;
                const index = activeElems[0]._index;
                const url = dataset[index].commit.url;
                window.open(url, '_blank');
              },
            };

            new Chart(canvas, {
              type: 'line',
              data,
              options,
            });
          }

          function renderBenchSet(name, benchSet, main) {
            const setElem = document.createElement('div');
            setElem.className = 'benchmark-set';
            main.appendChild(setElem);

            // Título do grupo (ex: GoBench)
            const nameElem = document.createElement('h2');
            nameElem.className = 'benchmark-title';
            nameElem.textContent = name;
            setElem.appendChild(nameElem);

            // Container do Grid
            const graphsElem = document.createElement('div');
            graphsElem.className = 'benchmark-graphs';
            setElem.appendChild(graphsElem);

            for (const [benchName, benches] of benchSet.entries()) {
              // Criação do Card para cada gráfico
              const card = document.createElement('div');
              card.className = 'chart-card';
              
              const cardTitle = document.createElement('h3');
              cardTitle.className = 'chart-title';
              cardTitle.textContent = benchName;
              card.appendChild(cardTitle);

              const canvasContainer = document.createElement('div');
              canvasContainer.className = 'canvas-container';
              card.appendChild(canvasContainer);

              graphsElem.appendChild(card);
              
              renderGraph(canvasContainer, benchName, benches);
            }
          }

          const main = document.getElementById('main');
          for (const {name, dataSet} of dataSets) {
            renderBenchSet(name, dataSet, main);
          }
        }

        renderAllChars(init());
      })();
    </script>
  </body>
</html>
