# /etc/hosa/hosa.toml
# HOSA — Homeostasis Operating System Agent
# Configuration file. All values shown are the defaults.
# Lines beginning with # are comments.
#
# Precedence: this file → CLI flags (CLI always wins)
# CLI flags: hosa --help

# ---------------------------------------------------------------------------
# [detection] — Predictive Cortex parameters
# ---------------------------------------------------------------------------
[detection]

# Mahalanobis distance thresholds for each alert level.
# Calibrated for a p=4 state vector (sched_wakeup, sys_brk, page_fault, block_rq).
# On a quiet server you can lower these. On a noisy shared host, raise them.
# Rule of thumb: threshold_vigilance ≈ 2–3× the median D_M observed in homeostasis.
threshold_vigilance   = 3.5
threshold_containment = 5.5
threshold_protection  = 8.0

# EWMA smoothing factor applied to D_M before derivative calculation.
# Lower = smoother signal, slower detection. Higher = faster detection, more noise.
# Valid range: (0, 1]. Default 0.2 is conservative — suitable for noisy environments.
alpha_ewma = 0.2

# Minimum samples collected before the cortex enables anomaly analysis.
# Defines the cold-start window. At normal_interval_ms=1000, this is 30 seconds.
min_samples = 30

# dD̄_M/dt thresholds for derivative-based escalation and hysteresis.
# If derivative exceeds escalate threshold, the alert level rises one extra step.
threshold_derivative_escalate = 2.0
threshold_derivative_relax    = 0.5

# Number of consecutive cycles below threshold before descending an alert level.
# Higher = more stable (less flapping), but slower recovery acknowledgment.
hysteresis_down = 5

# Per-probe EWMA alpha overrides. CPU probes benefit from higher alpha
# (reacts to sudden spikes). Memory/IO probes benefit from lower alpha
# (smooths out gradual trends, reduces noise from high-frequency counters).
[detection.alpha_per_probe]
cpu_run_queue   = 0.30
mem_brk_calls   = 0.20
mem_page_faults = 0.20
io_block_ops    = 0.15

# ---------------------------------------------------------------------------
# [sampling] — Collection frequency
# ---------------------------------------------------------------------------
[sampling]

# Sampling interval in homeostasis (milliseconds).
normal_interval_ms = 1000

# Sampling interval during Vigilance/Containment/Protection (milliseconds).
# Lower = more responsive during anomaly. Higher = less overhead.
vigilance_interval_ms = 100

# ---------------------------------------------------------------------------
# [motor] — Containment actuator (cgroups v2)
# ---------------------------------------------------------------------------
[motor]

# cgroup v2 directory managed by HOSA.
# HOSA creates this directory if it does not exist.
cgroup_path = "/sys/fs/cgroup/hosa"

# memory.high limit as a fraction of total RAM — applied at Level 2 (Containment).
# 0.75 = 75% of total RAM. Kernel applies memory pressure; processes are not killed.
containment_fraction = 0.75

# memory.high and memory.max limits as fractions of total RAM — Level 3 (Protection).
# Processes exceeding memory.max are killed by the cgroup OOM killer (not the global one).
protection_high_frac = 0.50
protection_max_frac  = 0.90

# ---------------------------------------------------------------------------
# [thalamus] — Telemetry emission (Thalamic Filter)
# ---------------------------------------------------------------------------
[thalamus]

# Period between heartbeat emissions in homeostasis (seconds).
# In homeostasis, HOSA emits only this heartbeat. All other telemetry is suppressed.
heartbeat_interval_s = 30